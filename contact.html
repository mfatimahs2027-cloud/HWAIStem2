<!-- contact.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Animals on Land, Mountain & the Sea - Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Theme Toggle -->
  <div class="theme-toggle">
    <button id="themeToggleBtn">Deep Ocean</button>
  </div>

  <div class="page-wrapper">

    <!-- Header -->
    <header class="site-header">
      <div class="container header-inner">
        <div class="logo">
          <a href="index.html">Animals on Land, Mountain & the Sea</a>
        </div>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>

      <!-- Page title -->
      <section class="page-title">
        <div class="container">
          <h1>Contact</h1>
          <p>Have questions or want to learn more? Send a message below.</p>
        </div>
      </section>

      <!-- Contact form -->
      <section class="contact-form-section">
        <div class="container">
          <form action="#" method="post">

            <div>
              <label for="contact-name">Name</label>
              <input type="text" id="contact-name" name="name" />
            </div>

            <div>
              <label for="contact-email">Email</label>
              <input type="email" id="contact-email" name="email" />
            </div>

            <div>
              <label for="contact-subject">Subject</label>
              <input type="text" id="contact-subject" name="subject" />
            </div>

            <div>
              <label for="contact-message">Message</label>
              <textarea id="contact-message" name="message"></textarea>
            </div>

            <button type="submit">Send Message</button>

          </form>
        </div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 Animals on Land, Mountain & the Sea. All rights reserved.</p>
      </div>
    </footer>

  </div>

  <!-- Theme Toggle Script -->
  <script>
    (function () {
      const body = document.body;
      const btn = document.getElementById('themeToggleBtn');

      function setTheme(dark) {
        if (dark) {
          body.classList.add('theme-dark');
          btn.textContent = 'Light Ocean';
          localStorage.setItem('theme', 'dark');
        } else {
          body.classList.remove('theme-dark');
          btn.textContent = 'Deep Ocean';
          localStorage.setItem('theme', 'light');
        }
      }

      const saved = localStorage.getItem('theme');
      if (saved === 'dark') setTheme(true);

      btn.addEventListener('click', () => {
        const isDark = body.classList.contains('theme-dark');
        setTheme(!isDark);
      });
    })();
  </script>

</body>
</html>
